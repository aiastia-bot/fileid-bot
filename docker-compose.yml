version: '3.8'

# ==================== 单机部署（默认） ====================
# 所有配置项在 .env 文件中设置，运行: docker compose up -d

services:
  bot:
    image: aiastia/fileid-bot:latest
    container_name: fileid-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${WEBHOOK_PORT:-8080}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

