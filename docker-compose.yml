version: '3.8'

# ==================== 单机部署（默认） ====================
# docker compose up -d

services:
  bot:
    build: .
    container_name: fileid-bot
    restart: unless-stopped
    environment:
      - ROLE=standalone
      - BOT_MODE=${BOT_MODE:-polling}
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS:-}
      - MAX_BOTS_PER_USER=${MAX_BOTS_PER_USER:-1}
      - BOT_MODE=${BOT_MODE:-polling}
      - WEBHOOK_HOST=${WEBHOOK_HOST:-}
      - WEBHOOK_PORT=${WEBHOOK_PORT:-8080}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - ALLOW_GROUP=${ALLOW_GROUP:-false}
    volumes:
      - ./data:/app/data
    ports:
      - "${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"

